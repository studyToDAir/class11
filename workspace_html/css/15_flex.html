    <title>Document</title>
    <style>
        .container{

            height: 300px;
            width: 300px;

            display: flex;

            /* main 축의 기본값 : 왼쪽에서 오른쪽으로 */
            flex-direction: row;

            /* 오른쪽에서 왼쪽으로 */
            /* flex-direction: row-reverse; */

            /* 위에서 아래로 */
            /* flex-direction: column; */
            
            /* 아래에서 위로 */
            /* flex-direction: column-reverse; */

            /* 기본값, 한줄에 모든 item을 표시하려고 노력 */
            /* flex-wrap: nowrap; */

            /* 넘치는 경우 다음줄로 (inline-block 처럼) */
            /* cross축 start에서 end */
            /* flex-wrap: wrap; */

            /* cross축의 end에서 start로 */
            /* flex-wrap: wrap-reverse; */


            /* 기본값, main축의 start 방향 정렬 */
            /* justify-content: flex-start; */

            /* main축의 end 방향 정렬 */
            /* justify-content: flex-end; */
            
            /* main축의 가운데 정렬 */
            /* justify-content: center; */

            /* 남은 공간을 사이사이에 균등하게 배치 */
            /* justify-content : space-between; */

            /* item의 양쪽에 동일한 공간 배치 */
            /* justify-content : space-around; */

            /* 모든 공간을 균등하게 배치 */
            /* justify-content : space-evenly; */


            /* 한 줄에 대한 cross축의 이야기 */
            /* 기본값, cross축으로 쭉~ 늘리기 */
            /* align-items: stretch; */

            /* cross축의 start 방향 정렬 */
            /* align-items: flex-start; */
            /* cross축의 end 방향 정렬 */
            /* align-items: flex-end; */
            /* cross축의 중앙 정렬 */
            /* align-items: center; */

            /* 여러 줄에 대한 cross축의 이야기*/

            /* align-content: flex-end; */
            /* align-content: center; */
            /* align-content: space-between; */
            /* align-content: space-around; */
            /* align-content: space-evenly; */

        }
        .container .item {
            border: 1px solid red;
            background-color: brown;
            color: #fff;

            /* width: 100px; */
            /* width: 100px; */
        }
    </style>
</head>
<body>
    div.container>div.item*5
    <div class="container">
        <div class="item">1</div>
        <div class="item" style="order: 1">2</div>
        <div class="item" style="order: -1">3</div>
        <div class="item" style="flex-grow: 0; flex-shrink: 3; min-width: 50px;">4</div>
        <div class="item" style="flex-grow: 0; flex-shrink: 2;">5</div>
    </div>

</html>
