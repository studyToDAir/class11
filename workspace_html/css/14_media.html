<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        ul {
            border: 1px solid blue;
            list-style: none;
            padding-left: 0;
        }
        li {
            border: 1px solid red;
            display: inline-block;
            width: 100px;
            height: 50px;
            line-height: 50px;
            text-align: center;
        }
        span {
            display: none;
        }

        @media screen 
        and (max-width: 600px)
        /* and (min-width: 500px) */
        {
            /* 또 다른 CSS 영역 */
            li {
                display: block;
                width: 100%;
            }

            span {
                display: inline;
            }

            ul {
                /* display: none; */
                opacity: 0;
                position: relative;
                top: -20px;

            }

            span:hover + ul {
                transition: all .5s;
                /* display: block; */
                opacity: 1;
                top: 0px;
            }
        }

    </style>
</head>
<body>
    <span>햄버거 메뉴(메뉴열기)</span>
    <ul>
        <li>메일</li>
        <li>블로그</li>
        <li>웹툰</li>
        <li>카페</li>
    </ul>
</body>
</html>
