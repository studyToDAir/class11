<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .hidden {
            visibility: hidden;
        }
        .none {
            display: none;
        }
        .opacity{
            /* opacity: 0.7; */
            opacity: 0;
        }
    </style>
</head>
<body>
    <p>첫번째</p>
    <p class="hidden">두번째</p>
    <p class="none">세번째</p>
    <p class="opacity">네번째</p>
    <p>다섯번째</p>
</body>
</html>
