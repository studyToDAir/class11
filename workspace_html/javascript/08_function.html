    function plus2(x, y){
        console.log('x :', x)
        console.log('y :', y)
        if(y == undefined){
            console.log('y값 입력 못받음')
            y = 0
        }

        return z
    }

    // 전달인자의 값이 undefined일 때 기본 값 지정
    // 전달 받은 값이 있으면 사용하고 없으면 기본값 사용
    function plus3(x, y=0){
        console.log('x :', x)
        console.log('y :', y)
        if(y == undefined){
            y = 0
        }

        const z = x + y
        return z
    }
    // 전달인자를 적게 줘도 에러 없음
    // 값은 undefined
