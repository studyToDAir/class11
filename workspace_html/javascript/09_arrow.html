<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
<script>
    // 화살표 함수 arrow function
    // 익명 함수를 선언하는 문법

    // 일반적인 익명 함수
    const fn1 = function(a, b){
        console.log(a, b)
        return a, b
    }
    fn1(1, 2)

    (function(a, b){
        console.log(a, b)
        return a, b
    })(1,2)

    const fn2 = (a, b) => {
        console.log(a, b)
        return a, b
    }

    // 전달 인자가 "하나인 경우에만"
    // 전달 인자의 () 생략 가능
    // const fn3 = (a) => {
    const fn3 = a => {
        console.log(a)
        return a
    }

    // 전달 인자가 없는 경우 () 생략 불가능
    const fn4 = ()=>{
        console.log(a)
        return a
    }

    const fn5 = (a, b)=>{
        return a + b
    }
    // 실행문 안에 return만 있는 경우
    // {}, return 을 생략 할 수 있다
    // {}를 생략한 경우 return도 생략해야 한다
    const fn6 = (a, b) => a + b

    const fn7 = a => a + 100

</script>
</head>
<body>
    
</body>
</html>
